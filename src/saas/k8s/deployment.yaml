apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluid-calendar
  labels:
    app: fluid-calendar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fluid-calendar
  template:
    metadata:
      labels:
        app: fluid-calendar
    spec:
      containers:
      - name: fluid-calendar
        image: registry.digitalocean.com/curatedletters/fluid-calendar-website:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: INFISICAL_TOKEN
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INFISICAL_TOKEN
        - name: PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: PROJECT_ID
        - name: INFISICAL_SECRET_ENV
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INFISICAL_SECRET_ENV
        - name: INFISICAL_API_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INFISICAL_API_URL
        - name: NEXT_PUBLIC_ENABLE_SAAS_FEATURES
          value: "true"
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fluid-calendar-service
spec:
  selector:
    app: fluid-calendar
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fluid-calendar-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - app.fluidcalendar.com
    secretName: fluid-calendar-tls
  rules:
  - host: app.fluidcalendar.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fluid-calendar-service
            port:
              number: 80
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
spec:
  template:
    spec:
      containers:
      - name: db-migrate
        image: registry.digitalocean.com/curatedletters/fluid-calendar-website:latest
        command: ["sh", "-c", "infisical run --token=$INFISICAL_TOKEN --projectId=$PROJECT_ID --env=$INFISICAL_SECRET_ENV --domain=$INFISICAL_API_URL -- npx prisma migrate deploy"]
        env:
        - name: INFISICAL_TOKEN
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INFISICAL_TOKEN
        - name: PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: PROJECT_ID
        - name: INFISICAL_SECRET_ENV
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INFISICAL_SECRET_ENV
        - name: INFISICAL_API_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INFISICAL_API_URL
      restartPolicy: Never
  backoffLimit: 3 