# Combined Kubernetes Configuration

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: fluid-calendar

---
# Service Account and RBAC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluid-calendar-sa
  namespace: fluid-calendar
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-reader
  namespace: fluid-calendar
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fluid-calendar-job-reader
  namespace: fluid-calendar
subjects:
- kind: ServiceAccount
  name: fluid-calendar-sa
  namespace: fluid-calendar
roleRef:
  kind: Role
  name: job-reader
  apiGroup: rbac.authorization.k8s.io

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: fluid-calendar
  namespace: fluid-calendar
spec:
  selector:
    app: fluid-calendar
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP

---
# Migration Job
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: fluid-calendar
spec:
  backoffLimit: 4
  template:
    spec:
      imagePullSecrets:
        - name: do-registry-secret
      containers:
      - name: db-migrate
        image: registry.digitalocean.com/curatedletters/fluid-calendar-website:latest
        imagePullPolicy: Always
        command: ["npm"]
        args: ["run", "prisma:update"]
        env:
        - name: INFISICAL_TOKEN
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INFISICAL_TOKEN
        - name: PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: PROJECT_ID
        - name: INFISICAL_SECRET_ENV
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INFISICAL_SECRET_ENV
        - name: INFISICAL_API_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INFISICAL_API_URL
      restartPolicy: Never

---
# Main Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluid-calendar
  namespace: fluid-calendar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fluid-calendar
  template:
    metadata:
      labels:
        app: fluid-calendar
    spec:
      serviceAccountName: fluid-calendar-sa
      imagePullSecrets:
        - name: do-registry-secret
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - fluid-calendar
              topologyKey: "kubernetes.io/hostname"
      initContainers:
      - name: wait-for-migration
        image: bitnami/kubectl:latest
        command: ['sh', '-c', 'until kubectl get job db-migrate -n fluid-calendar -o jsonpath="{.status.succeeded}" | grep 1; do echo waiting for migration; sleep 2; done;']
      containers:
      - name: fluid-calendar
        image: registry.digitalocean.com/curatedletters/fluid-calendar-website:latest
        imagePullPolicy: Always
        env:
        - name: INFISICAL_TOKEN
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INFISICAL_TOKEN
        - name: PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: PROJECT_ID
        - name: INFISICAL_SECRET_ENV
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INFISICAL_SECRET_ENV
        - name: INFISICAL_API_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INFISICAL_API_URL
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1024Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fluid-calendar-hpa
  namespace: fluid-calendar
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fluid-calendar
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fluid-calendar
  namespace: fluid-calendar
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - fluidcalendar.com
    secretName: fluid-calendar-tls
  rules:
  - host: fluidcalendar.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fluid-calendar
            port:
              number: 80 